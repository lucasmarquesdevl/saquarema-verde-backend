<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Saqua Verde</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Estilos rápidos para os novos elementos */
        .input-file { padding: 10px 0; }
        #container-progresso { margin: 15px 0; }
        .progress-bar-bg { width: 100%; background: #eee; border-radius: 8px; overflow: hidden; }
        #barra-progresso { width: 0%; height: 25px; background: #28a745; transition: width 0.3s; text-align: center; color: white; line-height: 25px; font-weight: bold; }
        .preview-video { width: 100%; max-width: 300px; margin-top: 10px; border-radius: 8px; display: none; }
    </style>
</head>
<body>
    <header class="header">
        <h1 class="header-title">Painel Admin - Gerenciamento</h1>
        <nav>
            <a href="index.html" class="btn-secondary">← Voltar para o Início</a>
            <button id="logoutBtn" class="btn-logout">Sair</button>
        </nav>
    </header>

    <main class="container">
        
        <section class="admin-section">
            <h2 id="formTitle">➕ Inserir Novo Item</h2> 
            
            <form id="cadastroForm" class="form"> 
                <div class="form-group">
                    <label for="nome">Nome do Item:</label>
                    <input type="text" id="nome" name="nome" placeholder="Ex: Praia da Vila" required>
                </div>

                <div class="form-group">
                    <label for="descricao">Descrição:</label>
                    <textarea id="descricao" name="descricao" rows="4" placeholder="Detalhes sobre o local ou evento..." required></textarea>
                </div>
                
                <div style="display: flex; gap: 20px;">
                    <div class="form-group" style="flex: 1;">
                        <label for="data_evento">Data (Opcional):</label>
                        <input type="date" id="data_evento" name="data_evento">
                    </div>

                    <div class="form-group" style="flex: 1;">
                        <label for="hora_evento">Hora (Opcional):</label>
                        <input type="time" id="hora_evento" name="hora_evento">
                    </div>
                </div>

                <div class="form-group">
                    <label for="tipo">Tipo:</label>
                    <select id="tipo" name="tipo" required> 
                        <option value="">Selecione o Tipo</option>
                        <option value="Praia">Praia</option>
                        <option value="Trilha">Trilha</option>
                        <option value="Ponto Turístico">Ponto Turístico</option>
                        <option value="Evento">Evento</option>
                    </select>
                </div>

                <div class="form-group" style="background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px dashed #ccc;">
                    <label for="video">🎥 Anexar Vídeo de Divulgação (MP4):</label>
                    <input type="file" id="video" name="video" accept="video/mp4" class="input-file">
                    <video id="videoPreview" class="preview-video" controls></video>
                </div>

                <div id="container-progresso" style="display:none;">
                    <label>Enviando arquivo para o servidor...</label>
                    <div class="progress-bar-bg">
                        <div id="barra-progresso">0%</div>
                    </div>
                </div>

                <button type="submit" class="btn-submit">🚀 Cadastrar Item</button>
                
                <p id="mensagem-cadastro" class="feedback-message"></p>
            </form>
        </section>

        <hr>
        
        <section class="admin-section">
            <h2>🗑️ Gerenciar e Excluir Itens</h2>
            <div id="lista-eventos-admin" class="listagem-container">
                <p>Carregando itens do banco de dados...</p>
            </div>
        </section>
        
    </main>

    <footer class="footer">
        <p>&copy; 2026 Saquarema Verde. Painel Administrativo Local.</p>
    </footer>

    <script src="admin.js"></script>

    <script>
        // Script simples para mostrar o preview do vídeo antes de enviar
        const videoInput = document.getElementById('video');
        const videoPreview = document.getElementById('videoPreview');

        videoInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                videoPreview.src = url;
                videoPreview.style.display = 'block';
            }
        });
    </script>
</body>
</html>
